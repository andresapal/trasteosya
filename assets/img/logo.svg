<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Trasteos Ya">
  <title>Trasteos Ya</title>
  <defs>
    <linearGradient id="ty-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2638"/>
      <stop offset="50%" stop-color="#E30613"/>
      <stop offset="100%" stop-color="#9F040E"/>
    </linearGradient>
    <linearGradient id="ty-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F66"/>
      <stop offset="50%" stop-color="#0A1845"/>
      <stop offset="100%" stop-color="#040A28"/>
    </linearGradient>
    <linearGradient id="ty-blue-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1845"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="ty-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="rgba(159,4,14,0.35)"/>
    </filter>
  </defs>

  <!-- Líneas de velocidad izquierda (rojas) -->
  <g stroke="url(#ty-red)" stroke-linecap="round" fill="none">
    <line x1="20"  y1="90"  x2="135" y2="90"  stroke-width="8"/>
    <line x1="5"   y1="140" x2="160" y2="140" stroke-width="14"/>
    <line x1="15"  y1="195" x2="148" y2="195" stroke-width="11"/>
    <line x1="35"  y1="245" x2="130" y2="245" stroke-width="8"/>
  </g>

  <!-- TRASTEOS wordmark (italicizado) -->
  <g transform="skewX(-12)" filter="url(#ty-shadow)">
    <text x="280" y="240" font-family="'Plus Jakarta Sans', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="195" letter-spacing="-9" fill="url(#ty-red)">TRASTEOS</text>
  </g>

  <!-- Círculo azul exterior con gradiente diagonal -->
  <circle cx="1050" cy="160" r="138" fill="#FFFFFF" stroke="url(#ty-blue-ring)" stroke-width="18"/>
  <!-- Anillo rojo interior fino -->
  <circle cx="1050" cy="160" r="120" fill="none" stroke="#E30613" stroke-width="3.5"/>

  <!-- YA wordmark (italicizado, dentro del círculo) -->
  <g transform="skewX(-12)">
    <text x="1095" y="220" font-family="'Plus Jakarta Sans', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="155" fill="url(#ty-blue)" text-anchor="middle">YA</text>
  </g>

  <!-- Líneas de velocidad derecha (mix azul/red glow) -->
  <g stroke-linecap="round" fill="none">
    <line x1="1208" y1="65"  x2="1278" y2="65"  stroke="#0A1845" stroke-width="7"/>
    <line x1="1198" y1="115" x2="1278" y2="115" stroke="#0A1845" stroke-width="11"/>
    <line x1="1212" y1="160" x2="1278" y2="160" stroke="#3B82F6" stroke-width="14"/>
    <line x1="1198" y1="205" x2="1278" y2="205" stroke="#0A1845" stroke-width="11"/>
    <line x1="1208" y1="255" x2="1278" y2="255" stroke="#0A1845" stroke-width="7"/>
  </g>
</svg>
