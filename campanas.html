<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="/assets/img/logo.png">
<title>Campa&#241;as · Trasteos Ya</title>
<link rel="stylesheet" href="css/tokens.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Source Sans 3',sans-serif;background:#f4f5f9;color:#111827;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
:root{--brand:#003DA5;--brand2:#E30613;--brand-light:#e8edfb;--surface:#fff;--border:#e2e5ed;--muted:#6b7280;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}

.header{background:#fff;border-bottom:3px solid var(--brand);position:sticky;top:0;z-index:100;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.header-left{display:flex;align-items:center;gap:12px}
.header-left img{height:38px}
.header-left h1{font-size:15px;font-weight:700;color:var(--brand)}

/* TABS */
.main-tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:59px;z-index:99;padding:0 20px}
.main-tabs button{flex:1;max-width:200px;padding:12px 16px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.main-tabs button:hover{color:var(--brand)}
.main-tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}

/* LAYOUT */
.layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 400px;gap:16px;padding:16px 20px 100px;width:100%}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;padding:12px 8px 120px;max-width:100vw}
  .layout>*{max-width:100%;overflow-x:hidden;box-sizing:border-box}
  input,select,textarea{font-size:16px!important}
  .stats{gap:8px}
  .stat{min-width:0;flex:1 1 30%;padding:8px 10px}
  .stat .num{font-size:18px}
  .cl-phone{font-size:11px}
  .cl-city{display:none}
  .campaign{max-width:100%;box-sizing:border-box}
  .camp-head{padding:12px 10px}
  .camp-body{padding:12px 10px;max-height:none;overflow-x:hidden}
  .camp-actions{padding:10px}
  .tpl-grid{gap:6px;max-width:100%;box-sizing:border-box}
  .tpl-card{padding:8px 4px;min-width:0}
  .tpl-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tpl-desc{font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .field input,.field textarea{max-width:100%}
  .btn-wa{font-size:13px;padding:10px 12px}
  .hist-card{max-width:100%;overflow:hidden}
  .bib-grid{grid-template-columns:1fr 1fr!important}
  .bib-card{min-height:auto!important}
  .bib-card__title{font-size:12px!important}
  .bib-card__date{font-size:10px!important}
  .res-kpis{grid-template-columns:1fr 1fr!important}
  .funnel-wrap{overflow-x:auto}
  .main-tabs{padding:0 8px}
  .main-tabs button{font-size:12px;padding:10px 8px}
  .cal-grid{grid-template-columns:repeat(7,1fr)!important;gap:2px!important}
  .cal-cell{min-height:36px!important;font-size:10px!important;padding:2px!important}
  .cal-cell__label{font-size:9px!important}
  .cal-nav{flex-wrap:wrap;gap:6px}
  .cal-nav h3{font-size:13px!important}
  .alert-banner{flex-direction:column;gap:6px}
  .alert-banner .btn{width:100%}
}

.stats{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;flex:1;min-width:120px;box-shadow:var(--shadow)}
.stat .num{font-size:22px;font-weight:700;color:var(--brand);font-family:'JetBrains Mono',monospace}
.stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--surface)}
.search-box:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,61,165,.1)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:#002d7a}
.btn-wa{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-wa:hover{background:#15803d}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;background:var(--brand-light);color:var(--brand);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}

.client-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:#fafbfc}
.list-header label{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer}
.list-header input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand)}
.list-scroll{max-height:55vh;overflow-y:auto}
.cl-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f3f4f6;gap:10px;transition:background .1s;cursor:pointer}
.cl-row:hover{background:#f8f9fc}
.cl-row.selected{background:var(--brand-light)}
.cl-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--brand);flex-shrink:0;cursor:pointer}
.cl-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-phone{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.cl-city{font-size:11px;color:var(--brand);background:var(--brand-light);padding:1px 6px;border-radius:4px;flex-shrink:0}
.list-footer{padding:8px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center}

.campaign{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);position:sticky;top:115px;overflow:hidden}
.camp-head{padding:14px 16px;border-bottom:1px solid var(--border);background:#fafbfc}
.camp-head h2{font-size:15px;font-weight:700}
.camp-head p{font-size:12px;color:var(--muted);margin-top:2px}
.camp-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;max-height:65vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.field select,.field input,.field textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:var(--surface);transition:.15s}
.field select:focus,.field input:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,61,165,.1)}
.field textarea{resize:vertical;min-height:100px;line-height:1.5}

.cat-pills{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);transition:.15s}
.cat-pill:hover{border-color:var(--brand);color:var(--brand)}
.cat-pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}

.channel-checks{display:flex;gap:8px;flex-wrap:wrap}
.channel-checks label{font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer}
.channel-checks input{accent-color:var(--brand)}

.estado-pills{display:flex;gap:6px;flex-wrap:wrap}
.estado-pill{padding:4px 10px;border:1px solid var(--border);border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);transition:.15s}
.estado-pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}

.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;box-sizing:border-box}
.tpl-card{border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:.15s;text-align:center;min-width:0;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word;box-sizing:border-box}
.tpl-card:hover{border-color:var(--brand);background:#fafbfc}
.tpl-card.active{border-color:var(--brand);background:var(--brand-light)}
.tpl-icon{font-size:20px;margin-bottom:4px;display:flex;align-items:center;justify-content:center}
.tpl-icon svg{width:24px;height:24px}
.tpl-name{font-size:12px;font-weight:600}
.tpl-desc{font-size:10px;color:var(--muted);margin-top:2px}

.preview-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto}
.preview-box .var{background:#fef3c7;padding:0 3px;border-radius:3px;font-weight:600}
.camp-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* BIBLIOTECA */
.bib-container{max-width:1200px;margin:0 auto;padding:16px 20px 100px}
.bib-section{margin-bottom:32px}
.bib-section__title{font-size:14px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--brand-light)}
.bib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.bib-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:pointer;min-height:200px;display:flex;flex-direction:column}
.bib-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,61,165,.12)}
.bib-card__visual{height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bib-card__visual svg{width:60px;height:60px}
.bib-card__visual img{width:100%;height:100%;object-fit:cover}
.bib-card__body{padding:10px 12px;flex:1;display:flex;flex-direction:column}
.bib-card__title{font-size:13px;font-weight:700;margin-bottom:2px}
.bib-card__date{font-size:11px;color:var(--muted)}
.bib-card__desc{font-size:11px;color:var(--muted);margin-top:4px;flex:1}
.bib-card__actions{display:flex;gap:6px;margin-top:8px}
.bib-card__actions .btn{font-size:11px;padding:4px 8px;flex:1;text-align:center}

/* RESULTADOS */
.res-container{max-width:1200px;margin:0 auto;padding:16px 20px 100px}
.res-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.res-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}
.res-kpi .num{font-size:28px;font-weight:700;color:var(--brand);font-family:'JetBrains Mono',monospace}
.res-kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;margin-top:4px}

.funnel-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;box-shadow:var(--shadow)}
.funnel-section h3{font-size:14px;font-weight:700;margin-bottom:16px}
.funnel-wrap{display:flex;gap:0;align-items:flex-start}
.funnel-step{flex:1;text-align:center;position:relative}
.funnel-step__bar{height:40px;background:var(--brand);margin:0 2px;border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative}
.funnel-step:first-child .funnel-step__bar{border-radius:8px 4px 4px 8px}
.funnel-step:last-child .funnel-step__bar{border-radius:4px 8px 8px 4px}
.funnel-step__bar input{width:50px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:4px;color:#fff;font-size:14px;font-weight:700;text-align:center;padding:4px;font-family:'JetBrains Mono',monospace}
.funnel-step__bar input::placeholder{color:rgba(255,255,255,.5)}
.funnel-step__label{font-size:10px;font-weight:600;color:var(--muted);margin-top:6px;text-transform:uppercase}
.funnel-step__arrow{position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--brand);font-size:16px;z-index:2}

.hist-section{margin-top:16px;padding:0 2px}
.hist-section h3{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.hist-card{max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.hist-top{display:flex;justify-content:space-between;align-items:center}
.hist-name{font-weight:700;font-size:13px}
.hist-date{font-size:11px;color:var(--muted)}
.hist-stats{font-size:12px;color:var(--muted);margin-top:4px}
.hist-actions{margin-top:6px;display:flex;gap:6px}

.res-hist-table{width:100%;border-collapse:collapse;font-size:12px}
.res-hist-table th{text-align:left;padding:8px 10px;background:#fafbfc;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;color:var(--muted)}
.res-hist-table td{padding:8px 10px;border-bottom:1px solid #f3f4f6}
.res-hist-table tr:hover{background:#f8f9fc}

/* MODAL */
.piece-modal{display:none;position:fixed;inset:0;z-index:9998;align-items:center;justify-content:center;padding:20px}
.piece-modal.open{display:flex}
.piece-modal__bg{position:absolute;inset:0;background:rgba(5,14,45,.7);backdrop-filter:blur(8px)}
.piece-modal__box{position:relative;background:#fff;border-radius:16px;padding:20px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.piece-modal__box svg{width:100%;height:auto;border-radius:12px}
.piece-modal__box img{width:100%;height:auto;border-radius:12px}
.piece-modal__close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(0,0,0,.1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.piece-modal__actions{display:flex;gap:8px;margin-top:12px}
.piece-modal__actions .btn{flex:1;text-align:center}

/* CALENDARIO */
.cal-container{max-width:1200px;margin:0 auto;padding:16px 20px 100px}
.alert-banner{display:flex;align-items:center;gap:12px;background:#fef3c7;border:1px solid #fbbf24;border-radius:var(--radius);padding:12px 16px;margin-bottom:16px}
.alert-banner--urgent{background:#fee2e2;border-color:#f87171}
.alert-banner__icon{flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.alert-banner__icon--warn{background:#fbbf24;color:#78350f}
.alert-banner__icon--urgent{background:#f87171;color:#7f1d1d}
.alert-banner__text{flex:1;font-size:13px;line-height:1.4}
.alert-banner__text strong{display:block;font-size:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav h3{font-size:16px;font-weight:700}
.cal-nav .btn{min-width:36px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-head span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{min-height:56px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;position:relative;cursor:default;transition:.15s}
.cal-cell--empty{background:transparent;border-color:transparent}
.cal-cell--today{border-color:var(--brand);box-shadow:0 0 0 2px rgba(0,61,165,.15)}
.cal-cell--event{background:var(--brand-light);border-color:rgba(0,61,165,.3);cursor:pointer}
.cal-cell--event:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,61,165,.15)}
.cal-cell--alert{background:#fef3c7;border-color:#fbbf24}
.cal-cell--urgent{background:#fee2e2;border-color:#f87171}
.cal-cell__day{font-weight:700;font-size:11px;color:var(--muted)}
.cal-cell--today .cal-cell__day{color:var(--brand)}
.cal-cell__label{font-size:10px;font-weight:600;color:var(--brand);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;line-height:1.3}
.cal-cell--alert .cal-cell__label{color:#92400e}
.cal-cell--urgent .cal-cell__label{color:#991b1b}
.cal-legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.cal-legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.cal-legend span::before{content:'';width:12px;height:12px;border-radius:3px;display:inline-block}
.cal-legend .leg-event::before{background:var(--brand-light);border:1px solid rgba(0,61,165,.3)}
.cal-legend .leg-alert::before{background:#fef3c7;border:1px solid #fbbf24}
.cal-legend .leg-urgent::before{background:#fee2e2;border:1px solid #f87171}
.cal-legend .leg-today::before{background:var(--surface);border:2px solid var(--brand)}
.cal-upcoming{margin-top:24px}
.cal-upcoming h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cal-upcoming__list{display:flex;flex-direction:column;gap:8px}
.cal-upcoming__item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow)}
.cal-upcoming__item--alert{border-left:4px solid #fbbf24}
.cal-upcoming__item--urgent{border-left:4px solid #f87171}
.cal-upcoming__item--past{opacity:.5}
.cal-upcoming__icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-upcoming__icon svg{width:20px;height:20px}
.cal-upcoming__info{flex:1;min-width:0}
.cal-upcoming__info strong{display:block;font-size:13px}
.cal-upcoming__info span{font-size:11px;color:var(--muted)}
.cal-upcoming__actions{display:flex;gap:6px;flex-shrink:0}

/* DARK MODE */
body.ty-dark{color:#e8eaed}
body.ty-dark .header{background:rgba(22,24,34,.92);border-bottom-color:rgba(255,255,255,.06)}
body.ty-dark .main-tabs{background:rgba(22,24,34,.92);border-bottom-color:rgba(255,255,255,.06)}
body.ty-dark .stat,body.ty-dark .client-list,body.ty-dark .campaign,body.ty-dark .hist-card,body.ty-dark .bib-card,body.ty-dark .res-kpi,body.ty-dark .funnel-section{background:rgba(30,32,44,.95);border-color:rgba(255,255,255,.08)}
body.ty-dark .list-header,body.ty-dark .camp-head{background:rgba(20,22,32,.9)}
body.ty-dark .cl-row{border-bottom-color:rgba(255,255,255,.04)}
body.ty-dark .cl-row:hover,body.ty-dark .bib-card:hover{background:rgba(255,255,255,.04)}
body.ty-dark .cl-row.selected{background:rgba(0,61,165,.2)}
body.ty-dark .search-box,body.ty-dark .field select,body.ty-dark .field input,body.ty-dark .field textarea{background:rgba(20,22,32,.8);border-color:rgba(255,255,255,.1);color:#e8eaed}
body.ty-dark .btn{background:rgba(30,32,44,.95);border-color:rgba(255,255,255,.1);color:#e8eaed}
body.ty-dark .tpl-card{border-color:rgba(255,255,255,.08);background:rgba(20,22,32,.8)}
body.ty-dark .tpl-card.active{background:rgba(0,61,165,.2);border-color:rgba(0,61,165,.5)}
body.ty-dark .preview-box{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.2);color:#e8eaed}
body.ty-dark .cat-pill,body.ty-dark .estado-pill{background:rgba(30,32,44,.95);border-color:rgba(255,255,255,.1);color:#e8eaed}
body.ty-dark .bib-section__title{color:#93b4f5;border-bottom-color:rgba(147,180,245,.2)}
body.ty-dark .res-hist-table th{background:rgba(20,22,32,.9)}
body.ty-dark .res-hist-table td{border-bottom-color:rgba(255,255,255,.04)}
body.ty-dark .piece-modal__box{background:rgba(30,32,44,.98)}
body.ty-dark .cal-cell{background:rgba(30,32,44,.95);border-color:rgba(255,255,255,.08)}
body.ty-dark .cal-cell--event{background:rgba(0,61,165,.15);border-color:rgba(0,61,165,.3)}
body.ty-dark .cal-cell--alert{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3)}
body.ty-dark .cal-cell--urgent{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}
body.ty-dark .alert-banner{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:#e8eaed}

<body data-gate="admin-only">

<div class="header">

  </div>
</div>

<div class="main-tabs" id="main-tabs">

  <button onclick="switchTab('resultados')">Resultados</button>
  <button onclick="switchTab('calendario')">Calendario</button>
</div>

<!-- ============ TAB 1: ENVIAR ============ -->
<div id="view-enviar">

      <button class="btn btn-sm" onclick="selectAll()">Todos</button>
      <button class="btn btn-sm" onclick="selectNone()">Ninguno</button>
      <span class="badge" id="sel-count">0 seleccionados</span>
    </div>
    <div class="client-list">
      <div class="list-header">
        <label><input type="checkbox" id="check-all" onchange="toggleAll(this.checked)"> Seleccionar pagina</label>

      <div class="list-scroll" id="client-scroll"></div>
      <div class="list-footer" id="list-footer"></div>

        <div id="wa-status-piece" style="max-width:300px;margin:0 auto 16px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);min-height:120px;display:flex;align-items:center;justify-content:center;background:rgba(37,211,102,.04);border:2px dashed rgba(37,211,102,.25);cursor:pointer" onclick="document.getElementById('status-file-input').click()">

      </div>
    </div>
  </div>

        <div class="field">
          <label>Categoria</label>
          <div class="cat-pills" id="cat-pills"></div>
        </div>
        <div class="field">
          <label>Nombre de la campana</label>
          <input type="text" id="camp-name" placeholder="Ej: Referidos Julio 2026" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>Modelo de campana</label>
          <div class="tpl-grid" id="tpl-grid"></div>
        </div>

            <label><input type="checkbox" value="seo"> SEO</label>
            <label><input type="checkbox" value="organico"> Organico</label>

        </div>
        <div class="field">

        </div>
        <div class="field">
          <label>Vista previa</label>

        <button class="btn" onclick="copiarLista()">Copiar lista de numeros</button>
        <button class="btn" onclick="exportarCampana()">Descargar CSV de campana</button>
      </div>
    </div>
  </div>
</div>
</div>

// ============ LOAD CLIENTS ============
function getLocalContacts(){
  var contacts=[];var seen={};
  try{
    var idx=JSON.parse(localStorage.getItem('ty_os_index')||'[]');
    idx.forEach(function(entry){try{
      var k=typeof entry==='string'?entry:entry.key;
      var os=JSON.parse(localStorage.getItem(k)||'{}');
      var name=os.cliente||os.nombreCliente||'';
      var phone=(os.telefono||os.celularCliente||'').replace(/\D/g,'');
      var city=(os.recogidas&&os.recogidas[0]?os.recogidas[0].ciudad:'')||os.ciudadOrigen||'';
      if(name&&phone&&!seen[phone]){seen[phone]=true;contacts.push({n:name,p:phone,c:city,src:'os'});}
    }catch(_){}});
  }catch(_){}
  try{
    var cache=JSON.parse(localStorage.getItem('ty_cot_cache')||'[]');
    cache.forEach(function(c){
      var name=c.nombre||c.cliente||'';var phone=(c.telefono||c.celular||'').replace(/\D/g,'');var city=c.ciudadOrigen||'';
      if(name&&phone&&!seen[phone]){seen[phone]=true;contacts.push({n:name,p:phone,c:city,src:'cot'});}
    });
  }catch(_){}
  return contacts;
}
function mergeAllContacts(sources){
  var seen={},merged=[];
  sources.forEach(function(list){list.forEach(function(c){var key=c.p.slice(-10);if(!seen[key]){seen[key]=true;merged.push(c);}});});
  merged.sort(function(a,b){return a.n.localeCompare(b.n);});
  return merged;
}
function initClients(fileClients,allContacts,googleContacts){
  CLIENTS=mergeAllContacts([googleContacts||[],allContacts||[],fileClients||[],getLocalContacts()]);
  filtered=CLIENTS.slice();
  renderStats();renderClients();renderTemplates();updatePreview();renderHistory();renderCatPills();renderEstadoPills();
}
function loadClients(){
  var fileClients=null,allContacts=null,googleContacts=null,done=0,need=CONTACTS_URL?3:2;
  function check(){done++;if(done>=need)initClients(fileClients,allContacts,googleContacts);}
  try{var xhr=new XMLHttpRequest();xhr.open('GET','/output/clientes.json',true);xhr.onload=function(){if(xhr.status===200)try{fileClients=JSON.parse(xhr.responseText);}catch(_){}check();};xhr.onerror=function(){check();};xhr.send();}catch(e){check();}
  try{var xhr2=new XMLHttpRequest();xhr2.open('GET','/output/contactos.json',true);xhr2.onload=function(){if(xhr2.status===200)try{allContacts=JSON.parse(xhr2.responseText);}catch(_){}check();};xhr2.onerror=function(){check();};xhr2.send();}catch(e){check();}
  if(CONTACTS_URL){
    fetch(CONTACTS_URL,{redirect:'follow'}).then(function(r){return r.json();}).then(function(d){
      if(d.ok&&d.contacts)googleContacts=d.contacts.map(function(c){return{n:c.n,p:c.p.replace(/[^\d]/g,''),c:'',src:'google'};});
    }).catch(function(){}).finally(function(){check();});
  }
}

function renderStatusPiece(){
  var el=document.getElementById('wa-status-piece');if(!el)return;
  var ph=document.getElementById('wa-status-placeholder');
  var customImg=getCustomPiece('wa_status');
  if(customImg){
    if(ph)ph.style.display='none';
    el.style.border='none';el.style.background='none';el.style.minHeight='0';
    el.innerHTML='<img src="'+customImg+'" style="width:100%;display:block;border-radius:12px" alt="Status">';

  } else {
    el.innerHTML='<div id="wa-status-placeholder" style="padding:30px;color:var(--muted);font-size:13px">Toca para subir tu imagen</div>';
    el.style.border='2px dashed rgba(37,211,102,.25)';el.style.background='rgba(37,211,102,.04)';el.style.minHeight='120px';
    document.getElementById('btn-share-status').disabled=true;
    document.getElementById('btn-download-status').disabled=true;
  }
}
function dataUrlToFile(dataUrl){
  try{
    var arr=dataUrl.split(','),mime=arr[0].match(/:(.*?);/)[1];
    var bstr=atob(arr[1]),n=bstr.length,u8=new Uint8Array(n);
    while(n--)u8[n]=bstr.charCodeAt(n);
    _statusFile=new File([u8],'status-trasteosya.jpg',{type:mime});
  }catch(_){_statusFile=null;}
}
function uploadStatusPiece(e){
  var file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('Imagen muy grande (max 5MB)');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=1080;var w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',0.9);
      saveCustomPiece('wa_status',dataUrl);
      dataUrlToFile(dataUrl);
      renderStatusPiece();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
function shareStatus(){
  if(!_statusFile){alert('Sube una imagen primero');return;}
  if(navigator.canShare&&navigator.canShare({files:[_statusFile]})){
    navigator.share({files:[_statusFile],title:'Trasteos Ya',text:'trasteosya.online'}).catch(function(){});
  } else {
    downloadStatusPiece();
    alert('Tu navegador no soporta compartir directo. La imagen se descargo, publicala manualmente como Estado en WhatsApp.');
  }
}
function downloadStatusPiece(){
  var customImg=getCustomPiece('wa_status');
  if(!customImg)return;
  var a=document.createElement('a');a.href=customImg;a.download='status-trasteosya.jpg';a.click();
}

// ============ CAMPAIGN ACTIONS ============
function ejecutarCampana(){
  if(selected.size===0){alert('Selecciona al menos un contacto');return;}
  var msg=document.getElementById('camp-msg').value.trim();
  if(!msg){alert('Escribe un mensaje');return;}
  var campName=document.getElementById('camp-name').value.trim()||'Sin nombre';
  var objetivo=document.getElementById('camp-objetivo').value.trim();
  var channels=[];document.querySelectorAll('.channel-checks input:checked').forEach(function(cb){channels.push(cb.value);});
  var clients=[];selected.forEach(function(idx){clients.push(CLIENTS[idx]);});
  var t=TEMPLATES[activeTpl]||{};
  saveCampaign({name:campName,type:activeTpl,category:t.category||'permanente',count:clients.length,msg:msg,channels:channels,estado:activeEstado,objetivo:objetivo});
  var i=0;
  function next(){
    if(i>=clients.length)return;
    var c=clients[i];var personal=msg.replace(/\{nombre\}/g,c.n.split(' ')[0]);
    window.open('https://wa.me/'+c.p+'?text='+encodeURIComponent(personal),'_blank');
    i++;
    if(i<clients.length&&i<10)setTimeout(next,800);
    else if(i>=10&&i<clients.length&&confirm('Se abrieron '+i+' chats. Continuar con los siguientes '+(clients.length-i)+'?'))setTimeout(next,800);
  }
  if(confirm('Se abriran '+clients.length+' chats de WhatsApp.\n\nContinuar?'))next();
}
function copiarLista(){
  var lines=[];selected.forEach(function(idx){var c=CLIENTS[idx];lines.push(c.n+'\t'+c.p);});
  if(!lines.length){alert('Selecciona al menos un cliente');return;}
  var text=lines.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){alert('Lista copiada ('+lines.length+' contactos)');});
  else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('Lista copiada');}
}

function downloadPiece(){
  var el=document.querySelector('#piece-modal-content svg')||document.querySelector('#piece-modal-content img');
  if(!el)return;
  if(el.tagName==='svg'){
    var svg=el.outerHTML;
    var blob=new Blob([svg],{type:'image/svg+xml'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(currentPieceKey||'pieza')+'.svg';a.click();URL.revokeObjectURL(a.href);
  } else {

function uploadPiece(e){
  var file=e.target.files[0];if(!file||!currentPieceKey)return;
  if(file.size>2*1024*1024){alert('Imagen muy grande (max 2MB)');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=800;var w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',0.85);
      saveCustomPiece(currentPieceKey,dataUrl);
      verPieza(currentPieceKey);
      renderBiblioteca();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ============ CALENDARIO ============
function getEventsForMonth(y,m){
  var events=[];
  Object.keys(CAMP_DATES).forEach(function(k){
    var cd=CAMP_DATES[k];
    if(cd.m===m){events.push({key:k,day:cd.d,label:cd.label,tpl:TEMPLATES[k]});}
  });
  var custom=getCustomEvents();
  custom.forEach(function(ev){
    var d=new Date(ev.date);
    if(d.getMonth()===m&&d.getFullYear()===y){events.push({key:'custom_'+ev.id,day:d.getDate(),label:ev.label,custom:true,customData:ev});}
  });
  return events;
}
function getAlertClass(eventDay,eventMonth,eventYear){
  var today=new Date();today.setHours(0,0,0,0);
  var evDate=new Date(eventYear,eventMonth,eventDay);evDate.setHours(0,0,0,0);
  var diff=(evDate-today)/(1000*60*60*24);
  if(diff<0)return '';
  if(diff<=2)return 'cal-cell--urgent';
  if(diff<=5)return 'cal-cell--alert';
  return 'cal-cell--event';
}
function renderCalendario(){
  var y=calYear,m=calMonth;
  var months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var days=['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
  var firstDay=new Date(y,m,1).getDay();
  var offset=(firstDay===0)?6:firstDay-1;
  var daysInMonth=new Date(y,m+1,0).getDate();
  var today=new Date();
  var todayD=(today.getFullYear()===y&&today.getMonth()===m)?today.getDate():-1;
  var events=getEventsForMonth(y,m);
  var eventMap={};
  events.forEach(function(ev){if(!eventMap[ev.day])eventMap[ev.day]=[];eventMap[ev.day].push(ev);});

  var alerts=getUpcomingAlerts();
  var html='';
  if(alerts.length){
    alerts.forEach(function(a){
      var cls=a.daysUntil<=2?'alert-banner--urgent':'';
      var iconCls=a.daysUntil<=2?'alert-banner__icon--urgent':'alert-banner__icon--warn';
      var iconChar=a.daysUntil<=2?'!!':'!';
      var timeText=a.daysUntil===0?'HOY':a.daysUntil===1?'MANANA':'En '+a.daysUntil+' dias';
      html+='<div class="alert-banner '+cls+'">'+
        '<div class="alert-banner__icon '+iconCls+'">'+iconChar+'</div>'+
        '<div class="alert-banner__text"><strong>'+timeText+': '+a.label+'</strong>Prepara la campana "'+a.label+'" para enviar a tus contactos.</div>'+
        '<button class="btn btn-sm btn-primary" onclick="prepararCampana(\''+a.key+'\')">Preparar</button>'+
        '</div>';
    });
  }

  html+='<div class="cal-nav">'+
    '<button class="btn btn-sm" onclick="calPrev()">&lt;</button>'+
    '<h3>'+months[m]+' '+y+'</h3>'+
    '<button class="btn btn-sm" onclick="calNext()">&gt;</button>'+
    '<button class="btn btn-sm" onclick="calToday()">Hoy</button>'+
    '<button class="btn btn-sm" onclick="addCustomEvent()">+ Evento</button>'+
    '</div>';

  html+='<div class="cal-head">';
  days.forEach(function(d){html+='<span>'+d+'</span>';});
  html+='</div>';

  html+='<div class="cal-grid">';
  for(var i=0;i<offset;i++)html+='<div class="cal-cell cal-cell--empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var evs=eventMap[d];
    var isToday=d===todayD;
    var cellClass='cal-cell';
    if(isToday)cellClass+=' cal-cell--today';
    if(evs&&evs.length){
      var alertCls=getAlertClass(d,m,y);
      if(alertCls)cellClass+=' '+alertCls;
      else cellClass+=' cal-cell--event';
    }
    var onclick=evs?'onclick="calCellClick('+d+','+m+','+y+')"':'';
    html+='<div class="'+cellClass+'" '+onclick+'>'+
      '<div class="cal-cell__day">'+d+'</div>';
    if(evs){evs.forEach(function(ev){html+='<div class="cal-cell__label" title="'+ev.label+'">'+ev.label+'</div>';});}
    html+='</div>';
  }
  html+='</div>';

  html+='<div class="cal-legend">'+
    '<span class="leg-today">Hoy</span>'+
    '<span class="leg-event">Campana programada</span>'+
    '<span class="leg-alert">Faltan 3-5 dias</span>'+
    '<span class="leg-urgent">Faltan 0-2 dias</span>'+
    '</div>';

  html+=renderUpcoming(y);

  document.getElementById('cal-content').innerHTML=html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendario();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendario();}
function calToday(){var n=new Date();calMonth=n.getMonth();calYear=n.getFullYear();renderCalendario();}

function calCellClick(d,m,y){
  var events=getEventsForMonth(y,m).filter(function(ev){return ev.day===d;});
  if(!events.length)return;
  var ev=events[0];
  if(ev.custom){
    if(confirm('Evento: '+ev.label+'\n\nEliminar este evento?')){
      removeCustomEvent(ev.customData.id);
      renderCalendario();
    }
    return;
  }
  if(confirm(ev.label+'\n\nPreparar esta campana para enviar?'))prepararCampana(ev.key);
}

function prepararCampana(key){
  if(TEMPLATES[key]){selectTemplate(key);switchTab('enviar');}
}

function getUpcomingAlerts(){
  var today=new Date();today.setHours(0,0,0,0);
  var y=today.getFullYear();
  var alerts=[];
  Object.keys(CAMP_DATES).forEach(function(k){
    var cd=CAMP_DATES[k];
    var evDate=new Date(y,cd.m,cd.d);evDate.setHours(0,0,0,0);
    if(evDate<today){evDate=new Date(y+1,cd.m,cd.d);evDate.setHours(0,0,0,0);}
    var diff=Math.round((evDate-today)/(1000*60*60*24));
    if(diff<=5)alerts.push({key:k,label:cd.label,daysUntil:diff,date:evDate});
  });
  var custom=getCustomEvents();
  custom.forEach(function(ev){
    var evDate=new Date(ev.date);evDate.setHours(0,0,0,0);
    var diff=Math.round((evDate-today)/(1000*60*60*24));
    if(diff>=0&&diff<=5)alerts.push({key:'custom',label:ev.label,daysUntil:diff,date:evDate,custom:true});
  });
  alerts.sort(function(a,b){return a.daysUntil-b.daysUntil;});
  return alerts;
}

function renderUpcoming(year){
  var today=new Date();today.setHours(0,0,0,0);
  var y=year||today.getFullYear();
  var list=[];
  Object.keys(CAMP_DATES).forEach(function(k){
    var cd=CAMP_DATES[k];
    var evDate=new Date(y,cd.m,cd.d);
    var diff=Math.round((evDate-today)/(1000*60*60*24));
    list.push({key:k,label:cd.label,date:evDate,diff:diff,icon:TEMPLATES[k]?TEMPLATES[k].icon:'',bg1:TEMPLATES[k]?TEMPLATES[k].bg1:'#1B3E8C'});
  });
  var custom=getCustomEvents();
  custom.forEach(function(ev){
    var evDate=new Date(ev.date);
    var diff=Math.round((evDate-today)/(1000*60*60*24));
    if(evDate.getFullYear()===y)list.push({key:'custom',label:ev.label,date:evDate,diff:diff,icon:'',bg1:'#6b7280',custom:true});
  });
  list.sort(function(a,b){return a.date-b.date;});

  var html='<div class="cal-upcoming"><h3>Todas las campanas del '+y+'</h3><div class="cal-upcoming__list">';
  list.forEach(function(item){
    var fecha=item.date.toLocaleDateString('es-CO',{day:'numeric',month:'long'});
    var cls='cal-upcoming__item';
    if(item.diff<0)cls+=' cal-upcoming__item--past';
    else if(item.diff<=2)cls+=' cal-upcoming__item--urgent';
    else if(item.diff<=5)cls+=' cal-upcoming__item--alert';
    var statusText=item.diff<0?'Pasada':item.diff===0?'HOY':item.diff===1?'Manana':'En '+item.diff+' dias';
    html+='<div class="'+cls+'">'+
      '<div class="cal-upcoming__icon" style="background:'+(item.bg1||'#6b7280')+'">'+
      (item.icon?item.icon.replace(/currentColor/g,'#fff'):'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>')+
      '</div>'+
      '<div class="cal-upcoming__info"><strong>'+item.label+'</strong><span>'+fecha+' · '+statusText+'</span></div>'+
      '<div class="cal-upcoming__actions">'+
      (item.diff>=0&&!item.custom?'<button class="btn btn-sm btn-primary" onclick="prepararCampana(\''+item.key+'\')">Preparar</button>':'')+
      '</div></div>';
  });
  html+='</div></div>';
  return html;
}

// ============ CUSTOM EVENTS ============
var CUSTOM_EVENTS_KEY='ty_camp_custom_events';
function getCustomEvents(){try{return JSON.parse(localStorage.getItem(CUSTOM_EVENTS_KEY)||'[]');}catch(_){return [];}}
function saveCustomEvents(evts){localStorage.setItem(CUSTOM_EVENTS_KEY,JSON.stringify(evts));}
function addCustomEvent(){
  var label=prompt('Nombre del evento:');
  if(!label)return;
  var dateStr=prompt('Fecha (AAAA-MM-DD):',new Date().toISOString().slice(0,10));
  if(!dateStr||!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))return;
  var evts=getCustomEvents();
  evts.push({id:Date.now(),label:label,date:dateStr});
  saveCustomEvents(evts);
  var d=new Date(dateStr);calMonth=d.getMonth();calYear=d.getFullYear();
  renderCalendario();
}
function removeCustomEvent(id){
  var evts=getCustomEvents().filter(function(e){return e.id!==id;});
  saveCustomEvents(evts);
}

// ============ ALERTAS AL CARGAR ============
function checkAlertsOnLoad(){
  var alerts=getUpcomingAlerts();
  var dismissed=getDismissedAlerts();
  var today=new Date().toISOString().slice(0,10);
  alerts.forEach(function(a){
    var key=a.key+'_'+a.date.toISOString().slice(0,10);
    if(dismissed[key]===today)return;
    if(a.daysUntil<=2){
      var timeText=a.daysUntil===0?'HOY':a.daysUntil===1?'MANANA':'En '+a.daysUntil+' dias';
      if(confirm('ALERTA: '+timeText+' es "'+a.label+'".\n\nPreparar la campana ahora?')){
        prepararCampana(a.key);
      }
      dismissAlert(key);
    }
  });
}
var DISMISSED_KEY='ty_camp_alerts_dismissed';
function getDismissedAlerts(){try{return JSON.parse(localStorage.getItem(DISMISSED_KEY)||'{}');}catch(_){return {};}}
function dismissAlert(key){var d=getDismissedAlerts();d[key]=new Date().toISOString().slice(0,10);localStorage.setItem(DISMISSED_KEY,JSON.stringify(d));}

// ============ UTILS ============
function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function formatPhone(p){if(p.length===12&&p.startsWith('57'))return'+57 '+p.substring(2,5)+' '+p.substring(5,8)+' '+p.substring(8);return p;}
